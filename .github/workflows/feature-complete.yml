name: feature-complete

on:
  workflow_dispatch:
    inputs:
      e2e:
        description: "Run e2e (Playwright, Chromium install heavy)"
        type: boolean
        required: false
        default: false

concurrency:
  group: feature-complete-${{ github.ref }}
  cancel-in-progress: false

jobs:
  core:
    name: typecheck + smoke + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run smoke
      - run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: core
    if: ${{ inputs.e2e == true }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
