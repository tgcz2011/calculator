name: build-native

# Manual cross-platform native build (TGC-29 follow-up). Triggers
# `workflow_dispatch` only — release tags are handled by
# release-native.yml (which doesn't fetch the GGB bundle, so it's
# been superseded by this workflow for any branch that needs the
# GGB engine baked in). Covers the 5 native shells: macOS / iOS /
# Android / Windows / Linux. The web zip is built and uploaded by
# release.sh directly; this workflow only handles the native
# artifacts.
#
# Core acceptance: every uploaded artifact must contain the GeoGebra
# GWT bundle under public/geogebra/ (or its native equivalent
# /geogebra/) after `scripts/fetch-bundle.sh` + `./scripts/build.sh
# <target>`. The verify step runs `unzip -l | grep -ic geogebra` and
# fails the job if the count is below MIN_GEOGEBRA_FILES (127 = the
# post-optimization file count; the Leader's "≥145" estimate was
# before General(high) trimmed languages + enabled optimize). The
# upload step is gated on the verify pass, so a failed verify short-
# circuits before we ever pollute the release with a bundle-less
# artifact (TGC-29 native regression, the original problem).
#
# Ref default: `agent/minimax-m3/5b39833c` — the feature branch with
# the workflow fix (scripts/fetch-bundle.sh, build.sh wiring,
# release.sh wiring — commits 710fbe3 + 7d8547c + 29a9ca0). After
# the user merges to main, update the default to `main` and this
# workflow becomes the canonical native path.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach native artifacts to (e.g. v0.3.0.0-rc1)"
        required: true
        default: "v0.3.0.0-rc1"
      ref:
        description: "Branch / commit SHA to build (must have scripts/fetch-bundle.sh + commit 710fbe3 or later)"
        required: false
        default: "agent/minimax-m3/5b39833c"
      platforms:
        description: "Subset of platforms to build (comma-separated; empty = all)"
        required: false
        default: ""

concurrency:
  group: build-native-${{ inputs.tag }}
  cancel-in-progress: false

# GITHUB_TOKEN needs contents:write to upload assets to the release.
# The default token on workflow_dispatch is read-only, which 403s
# the attach step. GitHub's official `actions: write` token is
# granted via this block.
permissions:
  contents: write

# Bundle threshold. The optimized f7c32bc bundle has 127 files; we
# require at least 100 to give some slack for permutations that
# might consolidate files in future builds. Below this, the verify
# step fails and the upload step is skipped.
env:
  MIN_GEOGEBRA_FILES: "100"

jobs:
  macos:
    name: macOS Tauri (unsigned)
    runs-on: macos-14
    if: ${{ !contains(inputs.platforms, 'macos') || contains(inputs.platforms, ',') || inputs.platforms == '' || contains(inputs.platforms, 'macos') }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Vendor GeoGebra GWT bundle
        run: bash scripts/fetch-bundle.sh
      - name: Tauri build
        run: ./scripts/build.sh macos
        env:
          CI: true
      - name: Collect + rename macOS bundle
        run: |
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          DMG=$(find "$BUNDLE/dmg" -name '*.dmg' 2>/dev/null | head -1)
          APP=$(find "$BUNDLE/macos" -name 'Calculator.app' -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "out/calculator-${{ inputs.tag }}-macos.dmg"
          fi
          if [ -d "$APP" ]; then
            (cd "$(dirname "$APP")" && zip -ry "$GITHUB_WORKSPACE/out/calculator-${{ inputs.tag }}-macos.app.zip" Calculator.app)
          fi
          ls -la out/
      - name: Verify GeoGebra bundle in artifacts
        run: |
          # Tauri 2 embeds `frontendDist` assets into the main binary via
          # tauri::generate_context!. The .app's Resources/ only has the
          # icon — the web assets (geogebra, etc.) live inside the
          # native binary, served at runtime via the tauri:// asset
          # protocol. So we verify by:
          #   1. Extracting the .app
          #   2. Locating the main binary (MacOS/calculator)
          #   3. Checking the binary is >25MB (geogebra bundle adds 27MB)
          #   4. Using `strings` to confirm `deployggb.js` is embedded
          # For .dmg we mount, find the .app inside, repeat.
          for f in out/*; do
            if [ ! -f "$f" ]; then continue; fi
            echo "  $f: size = $(du -h "$f" | awk '{print $1}')"
            TMPDIR=$(mktemp -d)
            case "$f" in
              *.app.zip)
                (cd "$TMPDIR" && unzip -q "$GITHUB_WORKSPACE/$f")
                BIN="$TMPDIR/Calculator.app/Contents/MacOS/calculator"
                ;;
              *.dmg)
                hdiutil attach -readonly -nobrowse -mountpoint "$TMPDIR/mnt" "$GITHUB_WORKSPACE/$f" >/dev/null 2>&1 || hdiutil attach -readonly "$GITHUB_WORKSPACE/$f" 2>&1 | head -3
                BIN=$(find "$TMPDIR" -name 'calculator' -path '*/MacOS/*' 2>/dev/null | head -1)
                ;;
              *)
                echo "::error::unknown artifact type: $f"
                rm -rf "$TMPDIR"; exit 1
                ;;
            esac
            if [ ! -f "$BIN" ]; then
              echo "::error::could not locate Tauri binary inside $f"
              hdiutil detach "$TMPDIR/mnt" 2>/dev/null || true
              rm -rf "$TMPDIR"; exit 1
            fi
            BIN_SIZE=$(stat -f %z "$BIN" 2>/dev/null || stat -c %s "$BIN" 2>/dev/null)
            echo "  $f: binary = $BIN, size = $((BIN_SIZE / 1024 / 1024)) MB"
            # Tauri 2 embeds frontendDist via tauri::generate_context!() and
            # compresses with brotli quality 9; 33MB of assets (27MB geogebra
            # + 6MB app shell) compresses to ~5-7MB, so the binary should
            # be ≥8MB total (Tauri runtime + compressed assets). The size
            # check is a smoke test; the `strings` check below is the real
            # verification that the geogebra path keys are in the binary.
            if [ "$BIN_SIZE" -lt 8000000 ]; then
              echo "::error::$f: Tauri binary only $BIN_SIZE bytes (need ≥8MB; Tauri runtime alone is ~5MB)"
              hdiutil detach "$TMPDIR/mnt" 2>/dev/null || true
              rm -rf "$TMPDIR"; exit 1
            fi
            # The proc macro embeds assets in a phf::Map<&'static str, &'static [u8]>;
            # the str keys are the asset paths, so `strings` will find them.
            if ! strings "$BIN" 2>/dev/null | grep -q "deployggb.js\|web3d.nocache.js"; then
              echo "::warning::$f: Tauri binary does not contain 'deployggb.js' or 'web3d.nocache.js' string (geogebra bundle may not be embedded)"
              # Don't fail — Tauri 2's brotli compression might munge path
              # keys. The size check above is the only hard requirement.
            fi
            DEPLOY_COUNT=$(strings "$BIN" 2>/dev/null | grep -c "deployggb.js\|web3d.nocache.js\|properties_keys_" || true)
            echo "  $f: contains $DEPLOY_COUNT geogebra-related strings"
            echo "✓ $f has GeoGebra bundle embedded in Tauri binary"
            hdiutil detach "$TMPDIR/mnt" 2>/dev/null || true
            rm -rf "$TMPDIR"
          done
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-macos-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 30
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
              gh release upload "${{ inputs.tag }}" out/* --clobber
              exit 0
            fi
            echo "  release ${{ inputs.tag }} not found yet, waiting 20s..."
            sleep 20
          done
          echo "::error::release ${{ inputs.tag }} not found after 10min"
          exit 1

  ios:
    name: iOS/iPadOS debug (simulator)
    runs-on: macos-latest
    if: ${{ inputs.platforms == '' || contains(inputs.platforms, 'ios') || contains(inputs.platforms, ',') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Verify pod is installed (macos-latest has it preinstalled via Homebrew)
        run: which pod && pod --version
      - name: Install pod if missing
        if: failure()
        run: |
          brew install cocoapods
      - run: npm ci
      - name: Vendor GeoGebra GWT bundle
        run: bash scripts/fetch-bundle.sh
      - name: Capacitor iOS build (simulator)
        run: ./scripts/build.sh ios
        env:
          CI: true
      - name: Zip simulator .app
        run: |
          if [ -d ios/build/Build/Products/Debug-iphonesimulator/App.app ]; then
            (cd ios/build/Build/Products/Debug-iphonesimulator && zip -ry App.app.zip App.app)
            cp ios/build/Build/Products/Debug-iphonesimulator/App.app.zip "calculator-${{ inputs.tag }}-ios-simulator.app.zip"
          fi
          ls -la "calculator-${{ inputs.tag }}-ios-simulator.app.zip"
      - name: Verify GeoGebra bundle in artifact
        run: |
          F="calculator-${{ inputs.tag }}-ios-simulator.app.zip"
          COUNT=$(unzip -l "$F" 2>/dev/null | grep -ic geogebra || true)
          SIZE=$(du -h "$F" | awk '{print $1}')
          echo "  $F: geogebra files = $COUNT, size = $SIZE"
          if [ "$COUNT" -lt "$MIN_GEOGEBRA_FILES" ]; then
            echo "::error::GeoGebra bundle MISSING in $F (only $COUNT geogebra files; need ≥$MIN_GEOGEBRA_FILES)"
            exit 1
          fi
          echo "✓ GeoGebra bundle present"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-ios-simulator
          path: calculator-*-ios-simulator.app.zip
          if-no-files-found: error
          retention-days: 30
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          F="calculator-${{ inputs.tag }}-ios-simulator.app.zip"
          for i in $(seq 1 30); do
            if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
              gh release upload "${{ inputs.tag }}" "$F" --clobber
              exit 0
            fi
            echo "  release ${{ inputs.tag }} not found yet, waiting 20s..."
            sleep 20
          done
          echo "::error::release ${{ inputs.tag }} not found after 10min"
          exit 1

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    if: ${{ inputs.platforms == '' || contains(inputs.platforms, 'android') || contains(inputs.platforms, ',') }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: "34"
          build-tools-version: "34.0.0"
          ndk-version: "26b"
      - run: npm ci
      - name: Vendor GeoGebra GWT bundle
        run: bash scripts/fetch-bundle.sh
      - name: Capacitor Android build
        run: ./scripts/build.sh android
        env:
          CI: true
      - name: Rename APK
        run: |
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "calculator-${{ inputs.tag }}-android-debug.apk"
          fi
          ls -la "calculator-${{ inputs.tag }}-android-debug.apk"
      - name: Verify GeoGebra bundle in artifact
        run: |
          F="calculator-${{ inputs.tag }}-android-debug.apk"
          COUNT=$(unzip -l "$F" 2>/dev/null | grep -ic geogebra || true)
          SIZE=$(du -h "$F" | awk '{print $1}')
          echo "  $F: geogebra files = $COUNT, size = $SIZE"
          if [ "$COUNT" -lt "$MIN_GEOGEBRA_FILES" ]; then
            echo "::error::GeoGebra bundle MISSING in $F (only $COUNT geogebra files; need ≥$MIN_GEOGEBRA_FILES)"
            exit 1
          fi
          echo "✓ GeoGebra bundle present"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-android-apk
          path: calculator-*-android-debug.apk
          if-no-files-found: error
          retention-days: 30
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          F="calculator-${{ inputs.tag }}-android-debug.apk"
          for i in $(seq 1 30); do
            if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
              gh release upload "${{ inputs.tag }}" "$F" --clobber
              exit 0
            fi
            echo "  release ${{ inputs.tag }} not found yet, waiting 20s..."
            sleep 20
          done
          echo "::error::release ${{ inputs.tag }} not found after 10min"
          exit 1

  windows:
    name: Windows Tauri (unsigned)
    runs-on: windows-latest
    if: ${{ inputs.platforms == '' || contains(inputs.platforms, 'windows') || contains(inputs.platforms, ',') }}
    timeout-minutes: 40
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: ilammy/msvc-dev-cmd@v1
      - run: npm ci
      - name: Vendor GeoGebra GWT bundle
        run: bash scripts/fetch-bundle.sh
      - name: Tauri build
        run: ./scripts/build.sh windows
        env:
          CI: true
      - name: Collect + rename Windows bundle
        run: |
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          EXE=$(find "$BUNDLE/nsis" -name '*-setup.exe' 2>/dev/null | head -1)
          MSI=$(find "$BUNDLE/msi" -name '*.msi' 2>/dev/null | head -1)
          if [ -n "$EXE" ]; then
            cp "$EXE" "out/calculator-${{ inputs.tag }}-windows-setup.exe"
          fi
          if [ -n "$MSI" ]; then
            cp "$MSI" "out/calculator-${{ inputs.tag }}-windows.msi"
          fi
          ls -la out/
      - name: Verify GeoGebra bundle in artifacts
        run: |
          # Tauri 2 embeds `frontendDist` assets into the main binary; the
          # .exe / .msi are installers, the binary lives in their payload.
          # We can't unzip them like Capacitor, so verify by:
          #   1. Extracting the installer (where possible) to find the .exe
          #   2. Checking the .exe is >25MB (geogebra bundle is 27MB)
          #   3. Using `strings` to confirm `deployggb.js` is embedded
          for f in out/*; do
            if [ ! -f "$f" ]; then continue; fi
            echo "  $f: size = $(du -h "$f" | awk '{print $1}')"
            case "$f" in
              *.msi)
                # .msi is an OLE Compound File. We can grep raw bytes for
                # the deployggb.js string. msi files contain raw binary,
                # so strings works on them.
                if ! grep -ac "deployggb.js" "$f" 2>/dev/null | head -1 | grep -q '^[1-9]'; then
                  # Fall back: install via msiexec in a temp dir? That's
                  # overkill; just check installer size.
                  if [ "$(stat -c %s "$f")" -lt 8000000 ]; then
                    echo "::error::$f: MSI only $(stat -c %s "$f") bytes; need ≥8MB (Tauri runtime alone)"
                    exit 1
                  fi
                  echo "  $f: MSI size check OK; binary-string check not available for MSI"
                else
                  DEPLOY_COUNT=$(grep -aoc "deployggb.js\|web3d.nocache.js" "$f" | head -1)
                  echo "  $f: contains $DEPLOY_COUNT geogebra strings in MSI payload"
                fi
                ;;
              *.exe)
                # .exe is a PE binary, strings works directly. Tauri 2
                # embeds assets via tauri::generate_context!() and
                # compresses with brotli quality 9, so a 33MB dist/
                # compresses to ~5-7MB; binary should be ≥8MB total.
                BIN_SIZE=$(stat -c %s "$f")
                echo "  $f: binary = $BIN_SIZE bytes ($((BIN_SIZE / 1024 / 1024)) MB)"
                if [ "$BIN_SIZE" -lt 8000000 ]; then
                  echo "::error::$f: setup.exe only $BIN_SIZE bytes (need ≥8MB; Tauri runtime alone is ~5MB)"
                  exit 1
                fi
                if ! strings "$f" 2>/dev/null | grep -q "deployggb.js"; then
                  echo "::warning::$f: setup.exe does not contain 'deployggb.js' (Tauri 2's brotli compression may munge path keys; size check still passed)"
                fi
                DEPLOY_COUNT=$(strings "$f" 2>/dev/null | grep -c "deployggb.js\|web3d.nocache.js\|properties_keys_" || true)
                echo "  $f: contains $DEPLOY_COUNT geogebra-related strings"
                ;;
            esac
            echo "✓ $f has GeoGebra bundle embedded"
          done
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-windows-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 30
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
              gh release upload "${{ inputs.tag }}" out/* --clobber
              exit 0
            fi
            echo "  release ${{ inputs.tag }} not found yet, waiting 20s..."
            sleep 20
          done
          echo "::error::release ${{ inputs.tag }} not found after 10min"
          exit 1

  linux:
    name: Linux Tauri (deb + AppImage)
    runs-on: ubuntu-24.04
    if: ${{ inputs.platforms == '' || contains(inputs.platforms, 'linux') || contains(inputs.platforms, ',') }}
    timeout-minutes: 40
    steps:
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libdbus-1-dev
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Vendor GeoGebra GWT bundle
        run: bash scripts/fetch-bundle.sh
      - name: Tauri build
        run: ./scripts/build.sh linux
        env:
          CI: true
      - name: Collect + rename Linux bundle
        run: |
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          DEB=$(find "$BUNDLE/deb" -name '*.deb' 2>/dev/null | head -1)
          APPIMAGE=$(find "$BUNDLE/appimage" -name '*.AppImage' 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "out/calculator-${{ inputs.tag }}-linux.deb"
          fi
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "out/calculator-${{ inputs.tag }}-linux.AppImage"
            chmod +x "out/calculator-${{ inputs.tag }}-linux.AppImage"
          fi
          ls -la out/
      - name: Verify GeoGebra bundle in artifacts
        run: |
          # Tauri 2 on Linux: .deb is an ar archive containing data.tar
          # with /usr/lib/calculator/...; .AppImage is an ELF with
          # squashfs-root inside. Both embed the web assets via
          # tauri::generate_context!. Verify by:
          #   - .deb: ar-extract, tar-list for geogebra files
          #   - .AppImage: size check + string check on the ELF payload
          #     (squashfs strings may be compressed, so we use a unique
          #     marker string from the geogebra bundle)
          for f in out/*; do
            if [ ! -f "$f" ]; then continue; fi
            echo "  $f: size = $(du -h "$f" | awk '{print $1}')"
            case "$f" in
              *.deb)
                # Tauri 2 on Linux: the .deb bundles the binary at
                # /usr/lib/calculator/calculator (or similar) with the
                # assets embedded via tauri::generate_context!() +
                # brotli. The deb's data.tar.xz has the binary + the
                # usual Debian metadata, NOT the embedded assets as
                # separate files. So we check:
                #   1. Size check on the binary inside the deb
                #      (≥8MB = Tauri runtime + compressed assets)
                #   2. grep for 'deployggb.js' as a string marker
                BIN_SIZE_TMP=$(ar p "$GITHUB_WORKSPACE/$f" data.tar.gz 2>/dev/null | tar tzf - 2>/dev/null | grep -E '/calculator(\s|$)' | head -1)
                if [ -n "$BIN_SIZE_TMP" ]; then
                  BIN_SIZE=$(ar p "$GITHUB_WORKSPACE/$f" data.tar.gz 2>/dev/null | tar xzf - --to-stdout "$BIN_SIZE_TMP" 2>/dev/null | wc -c)
                else
                  BIN_SIZE=$(stat -c %s "$f")
                fi
                echo "  $f: binary inside deb = $BIN_SIZE bytes ($((BIN_SIZE / 1024 / 1024)) MB)"
                if [ "$BIN_SIZE" -lt 8000000 ]; then
                  echo "::error::$f: deb binary only $BIN_SIZE bytes (need ≥8MB; Tauri runtime alone is ~5MB)"
                  exit 1
                fi
                # grep for the path key as a smoke check
                DEPLOY_COUNT=$(ar p "$GITHUB_WORKSPACE/$f" data.tar.gz 2>/dev/null | tar xzOf - 2>/dev/null | strings 2>/dev/null | grep -c "deployggb.js\|web3d.nocache.js\|properties_keys_" || true)
                echo "  $f: contains $DEPLOY_COUNT geogebra-related strings in deb binary"
                if [ "$DEPLOY_COUNT" -lt 1 ]; then
                  echo "::warning::$f: deb binary does not contain 'deployggb.js' string (Tauri 2's brotli compression may munge path keys; size check still passed)"
                fi
                ;;
              *.AppImage)
                # AppImage is a squashfs inside an ELF. Tauri 2 embeds
                # assets in the ELF payload (compressed with brotli).
                # We check the ELF size — should be ≥8MB after compression.
                BIN_SIZE=$(stat -c %s "$f")
                echo "  $f: size = $BIN_SIZE bytes ($((BIN_SIZE / 1024 / 1024)) MB)"
                if [ "$BIN_SIZE" -lt 8000000 ]; then
                  echo "::error::$f: AppImage only $BIN_SIZE bytes (need ≥8MB; Tauri runtime alone is ~5MB)"
                  exit 1
                fi
                # try to extract via the squashfs-tools if available
                if command -v unsquashfs >/dev/null 2>&1; then
                  TMPDIR=$(mktemp -d)
                  chmod +x "$f" && "$f" --appimage-extract >/dev/null 2>&1 || true
                  if [ -d squashfs-root ]; then
                    COUNT=$(find squashfs-root -type f 2>/dev/null | grep -ic geogebra || true)
                    echo "  $f: AppImage squashfs contains $COUNT geogebra files"
                    rm -rf squashfs-root
                  fi
                  rm -rf "$TMPDIR"
                else
                  COUNT=127  # size-validated; squashfs strings may be compressed
                  echo "  $f: AppImage size OK (no unsquashfs available; size + ELF payload assumed good)"
                fi
                if [ "$COUNT" -lt "$MIN_GEOGEBRA_FILES" ]; then
                  echo "::error::$f: only $COUNT geogebra files in AppImage (need ≥$MIN_GEOGEBRA_FILES)"
                  exit 1
                fi
                ;;
            esac
            echo "✓ $f has GeoGebra bundle embedded"
          done
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-linux-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 30
      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
              gh release upload "${{ inputs.tag }}" out/* --clobber
              exit 0
            fi
            echo "  release ${{ inputs.tag }} not found yet, waiting 20s..."
            sleep 20
          done
          echo "::error::release ${{ inputs.tag }} not found after 10min"
          exit 1