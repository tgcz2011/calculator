name: release-native

# Auto-builds native artifacts (Android APK, iOS simulator .app, macOS Tauri)
# and attaches them to the GitHub release whenever a version tag is pushed.
# Triggered by `./scripts/release.sh` pushing `v<version>`. The web zip is
# attached by release.sh itself; this workflow appends the native shells.
#
# Also dispatchable (`workflow_dispatch`) with a `ref` input to retroactively
# build artifacts for an existing tag (e.g. backfilling a release), and a
# `platforms` input to build only a subset.
#
# ponytail: tag-push trigger (not just workflow_dispatch) so release.sh needs
# zero changes - push the tag, native artifacts follow automatically. All
# builds are debug/unsigned:
#   - iOS: simulator-only .app (device .ipa needs signing certs - ask owner)
#   - Android: debug APK (self-signed debug keystore, sideloadable)
#   - macOS: Tauri unsigned .dmg (needs Developer ID + notarization for distribution)
# Call out the signing status in release notes.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build (defaults to current ref)"
        required: false
        default: ""
      platforms:
        description: "Platforms to build"
        type: choice
        options: ["all", "ios", "android", "macos"]
        default: "all"

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'android'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - run: npm run build
      - name: Add Capacitor Android platform
        run: npx cap add android
      - name: Sync web build into native project
        run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK to include tag
        run: |
          TAG="${GITHUB_REF##*/}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "calculator-${TAG}-android-debug.apk"
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-android-apk
          path: calculator-*-android-debug.apk
          if-no-files-found: error
          retention-days: 14
      - name: Attach APK to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          # release.sh creates the release with the web zip right after pushing
          # the tag; retry until it exists, then upload.
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" "calculator-${TAG}-android-debug.apk" --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1

  ios:
    name: iOS debug (simulator)
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'ios'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Add Capacitor iOS platform
        run: npx cap add ios
      - name: Sync web build + install pods
        run: npx cap sync ios
      - name: Build for iOS Simulator (no signing needed)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            ONLY_ACTIVE_ARCH=NO \
            build
      - name: Zip simulator .app with tag in name
        run: |
          TAG="${GITHUB_REF##*/}"
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -ry "calculator-${TAG}-ios-simulator.app.zip" App.app
          cp "calculator-${TAG}-ios-simulator.app.zip" "$GITHUB_WORKSPACE/"
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-ios-simulator
          path: calculator-*-ios-simulator.app.zip
          if-no-files-found: error
          retention-days: 14
      - name: Attach .app to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" "calculator-${TAG}-ios-simulator.app.zip" --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1

  macos:
    name: macOS Tauri (unsigned)
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'macos'
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Tauri build (unsigned)
        run: npx tauri build
        env:
          # No code signing - produces unsigned .app and .dmg.
          CI: true
      - name: Collect + rename macOS bundle
        run: |
          TAG="${GITHUB_REF##*/}"
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          DMG=$(find "$BUNDLE/dmg" -name '*.dmg' 2>/dev/null | head -1)
          APP=$(find "$BUNDLE/macos" -name 'Calculator.app' -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "out/calculator-${TAG}-macos.dmg"
          fi
          if [ -d "$APP" ]; then
            cd "$(dirname "$APP")"
            zip -ry "$GITHUB_WORKSPACE/out/calculator-${TAG}-macos.app.zip" Calculator.app
          fi
          ls -la out/
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 14
      - name: Attach bundle to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" out/* --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1
