name: release-native

# Auto-builds native artifacts (Android APK, iOS simulator .app, macOS + Windows
# Tauri) and attaches them to the GitHub release whenever a version tag is
# pushed. Triggered by `./scripts/release.sh` pushing `v<version>`. The web zip
# is attached by release.sh itself; this workflow appends the native shells.
#
# Also dispatchable (`workflow_dispatch`) with a `ref` input to retroactively
# build + attach artifacts for an existing tag (e.g. backfilling v0.3.0), and a
# `platforms` input to build only a subset. When `ref` is a tag like `v0.3.0`,
# each job attaches its artifact to that tag's release.
#
# ponytail: tag-push trigger (not just workflow_dispatch) so release.sh needs
# zero changes - push the tag, native artifacts follow automatically. All
# builds are debug/unsigned:
#   - iOS/iPadOS: simulator-only .app (device .ipa needs signing certs - ask owner)
#   - Android: debug APK (self-signed debug keystore, sideloadable)
#   - macOS: Tauri unsigned .dmg + .app (needs Developer ID + notarization for distribution)
#   - Windows: Tauri unsigned .exe + .msi (needs code-signing cert for distribution)
# iPadOS shares the iOS .app (same build) - no separate job.
# Call out the signing status in release notes.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build (e.g. v0.3.0 to backfill that release)"
        required: false
        default: ""
      platforms:
        description: "Platforms to build"
        type: choice
        options: ["all", "ios", "android", "macos", "windows"]
        default: "all"

# GITHUB_TOKEN needs contents:write to upload assets to the release. The default
# token on workflow_dispatch has read-only contents, which 403s the attach step.
permissions:
  contents: write

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: false

# TAG = the release tag we attach artifacts to. On a tag push it's the pushed
# tag; on a workflow_dispatch backfill it's inputs.ref (when tag-like). Each job
# inherits this so rename + attach steps stay in sync without re-deriving it.
# ATTACH fires on tag push OR a workflow_dispatch whose ref is a tag (v*).

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'android'
    timeout-minutes: 20
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - run: npm run build
      - name: Add Capacitor Android platform
        run: npx cap add android
      - name: Sync web build into native project
        run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK to include tag
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "calculator-${TAG}-android-debug.apk"
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-android-apk
          path: calculator-*-android-debug.apk
          if-no-files-found: error
          retention-days: 14
      - name: Attach APK to release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release.sh creates the release with the web zip right after pushing
          # the tag; retry until it exists, then upload. On a backfill dispatch
          # the release already exists, so this succeeds immediately.
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" "calculator-${TAG}-android-debug.apk" --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1

  ios:
    name: iOS/iPadOS debug (simulator)
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'ios'
    timeout-minutes: 30
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Add Capacitor iOS platform
        run: npx cap add ios
      - name: Sync web build + install pods
        run: npx cap sync ios
      - name: Build for iOS Simulator (no signing needed)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            ONLY_ACTIVE_ARCH=NO \
            build
      - name: Zip simulator .app with tag in name
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -ry "calculator-${TAG}-ios-simulator.app.zip" App.app
          cp "calculator-${TAG}-ios-simulator.app.zip" "$GITHUB_WORKSPACE/"
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-ios-simulator
          path: calculator-*-ios-simulator.app.zip
          if-no-files-found: error
          retention-days: 14
      - name: Attach .app to release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" "calculator-${TAG}-ios-simulator.app.zip" --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1

  macos:
    name: macOS Tauri (unsigned)
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'macos'
    timeout-minutes: 40
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Tauri build (unsigned)
        run: npx tauri build
        env:
          # No code signing - produces unsigned .app and .dmg.
          CI: true
      - name: Collect + rename macOS bundle
        run: |
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          DMG=$(find "$BUNDLE/dmg" -name '*.dmg' 2>/dev/null | head -1)
          APP=$(find "$BUNDLE/macos" -name 'Calculator.app' -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "out/calculator-${TAG}-macos.dmg"
          fi
          if [ -d "$APP" ]; then
            cd "$(dirname "$APP")"
            zip -ry "$GITHUB_WORKSPACE/out/calculator-${TAG}-macos.app.zip" Calculator.app
          fi
          # Absolute path - we may have cd'd above, so `out/` relative would miss.
          ls -la "$GITHUB_WORKSPACE/out/"
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 14
      - name: Attach bundle to release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" out/* --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1

  windows:
    name: Windows Tauri (unsigned)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    if: >-
      github.event_name == 'push' || inputs.platforms == 'all' || inputs.platforms == 'windows'
    timeout-minutes: 40
    env:
      TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Tauri build (unsigned)
        run: npx tauri build
        env:
          CI: true
      - name: Collect + rename Windows bundle
        run: |
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p out
          EXE=$(find "$BUNDLE/nsis" -name '*-setup.exe' 2>/dev/null | head -1)
          MSI=$(find "$BUNDLE/msi" -name '*.msi' 2>/dev/null | head -1)
          if [ -n "$EXE" ]; then
            cp "$EXE" "out/calculator-${TAG}-windows-setup.exe"
          fi
          if [ -n "$MSI" ]; then
            cp "$MSI" "out/calculator-${TAG}-windows.msi"
          fi
          ls -la out/
      - name: Upload artifact (always, for backfill downloads)
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-tauri
          path: out/*
          if-no-files-found: error
          retention-days: 14
      - name: Attach bundle to release
        if: >-
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && startsWith(inputs.ref, 'v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" out/* --clobber
              exit 0
            fi
            sleep 10
          done
          echo "release ${TAG} not found after 10min" >&2
          exit 1
